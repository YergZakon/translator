name: iOS CI

on:
  pull_request:
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: XcodeGen, build, and test
    # The ARM macos-15 jobs observed here intermittently lost CoreSimulator.
    # Keep Xcode 16.4 while using the explicitly supported Intel image.
    runs-on: macos-15-intel
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/ios/RealtimeTranslator

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: >-
          xcodebuild
          -project RealtimeTranslator.xcodeproj
          -scheme RealtimeTranslator
          -resolvePackageDependencies

      - name: Prepare iOS simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail

          simulator_id="$(
            xcrun simctl list devices available --json |
              jq -r '[
                .devices | to_entries[] |
                select(.key | contains(".iOS-")) |
                .value[] |
                select(.isAvailable == true)
              ][0].udid // empty'
          )"

          if [[ -z "$simulator_id" ]]; then
            runtime_id="$(
              xcrun simctl list runtimes --json |
                jq -r '[.runtimes[] | select(.isAvailable == true and (.identifier | contains("iOS")))][-1].identifier // empty'
            )"
            device_type_id="$(
              xcrun simctl list devicetypes --json |
                jq -r '[.devicetypes[] | select(.name == "iPhone 16 Pro")][0].identifier // [.devicetypes[] | select(.name | startswith("iPhone"))][0].identifier // empty'
            )"

            if [[ -z "$runtime_id" || -z "$device_type_id" ]]; then
              echo "No available iOS runtime or iPhone device type was found." >&2
              xcrun simctl list
              exit 1
            fi

            simulator_id="$(xcrun simctl create RealtimeTranslator-CI "$device_type_id" "$runtime_id")"
          fi

          echo "simulator_id=$simulator_id" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$simulator_id" || true
          xcrun simctl bootstatus "$simulator_id" -b

      - name: Build app
        run: >-
          xcodebuild
          -project RealtimeTranslator.xcodeproj
          -scheme RealtimeTranslator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Run unit tests
        run: >-
          xcodebuild
          -project RealtimeTranslator.xcodeproj
          -scheme RealtimeTranslatorTests
          -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.simulator_id }}'
          CODE_SIGNING_ALLOWED=NO
          -test-timeouts-enabled YES
          -default-test-execution-time-allowance 60
          -maximum-test-execution-time-allowance 120
          test

name: iOS CI

on:
  pull_request:
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: XcodeGen, build, and test
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/ios/RealtimeTranslator

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: >-
          xcodebuild
          -project RealtimeTranslator.xcodeproj
          -scheme RealtimeTranslator
          -resolvePackageDependencies

      - name: Build app
        run: >-
          xcodebuild
          -project RealtimeTranslator.xcodeproj
          -scheme RealtimeTranslator
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Run unit tests
        run: >-
          xcodebuild
          -project RealtimeTranslator.xcodeproj
          -scheme RealtimeTranslatorTests
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5'
          CODE_SIGNING_ALLOWED=NO
          test

openapi: 3.1.0
info:
  title: Realtime Translator App API
  version: 0.1.0
  summary: Backend API for the 30-day RU ↔ EN iOS translation prototype
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    Contract between the iOS client and the application backend.

    The backend mints short-lived provider credentials, enforces configuration
    and limits, and accepts allowlisted technical telemetry. It does not proxy
    the WebRTC media path. Raw audio and full transcript text are forbidden.
servers:
  - url: /
    description: Current deployment origin; concrete dev/stage URLs come from app environment config
tags:
  - name: Installations
    description: Anonymous installation registration and app token lifecycle
  - name: Configuration
    description: Remote configuration, feature flags, limits, and kill switch
  - name: Translation sessions
    description: App sessions, short-lived translation legs, completion, and feedback
  - name: Telemetry
    description: Privacy-restricted technical event ingestion
  - name: Health
    description: Minimal infrastructure readiness and liveness
security:
  - appToken: []
paths:
  /v1/installations:
    post:
      tags: [Installations]
      operationId: registerInstallation
      summary: Register or recover an anonymous app installation
      security: []
      parameters:
        - $ref: '#/components/parameters/AppAttestation'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInstallationRequest'
      responses:
        '200':
          description: Existing installation token rotated or recovered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInstallationResponse'
        '201':
          description: Installation registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInstallationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
  /v1/config:
    get:
      tags: [Configuration]
      operationId: getConfig
      summary: Return active remote configuration and feature flags
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
        - $ref: '#/components/parameters/AppVersion'
        - $ref: '#/components/parameters/AppBuild'
      responses:
        '200':
          description: Active configuration
          headers:
            ETag:
              description: Version identifier for conditional requests
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfig'
        '304':
          description: Cached config is still current
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/translation-sessions:
    post:
      tags: [Translation sessions]
      operationId: createTranslationSession
      summary: Create an app session and one or two translation legs
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTranslationSessionRequest'
            examples:
              dialogue:
                $ref: '#/components/examples/CreateSessionRequest'
      responses:
        '201':
          description: Translation session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationSession'
              examples:
                dialogue:
                  $ref: '#/components/examples/CreateSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnsupportedConfiguration'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/UpstreamFailure'
        '503':
          $ref: '#/components/responses/Unavailable'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
  /v1/translation-sessions/{sessionId}/legs:
    post:
      tags: [Translation sessions]
      operationId: recreateTranslationLeg
      summary: Replace one failed or expired translation leg
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecreateTranslationLegRequest'
      responses:
        '201':
          description: Fresh translation leg credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationLegCredentials'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/UpstreamFailure'
        '503':
          $ref: '#/components/responses/Unavailable'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
  /v1/translation-sessions/{sessionId}/complete:
    post:
      tags: [Translation sessions]
      operationId: completeTranslationSession
      summary: Complete a session with technical summary metadata
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteTranslationSessionRequest'
      responses:
        '200':
          description: Session completed or already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteTranslationSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/translation-sessions/{sessionId}/feedback:
    post:
      tags: [Translation sessions]
      operationId: upsertTranslationSessionFeedback
      summary: Create or replace feedback for a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '200':
          description: Feedback stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/telemetry/batch:
    post:
      tags: [Telemetry]
      operationId: ingestTelemetryBatch
      summary: Ingest allowlisted technical events
      description: Full transcript text, raw audio, secrets, and SDP are forbidden.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryBatchRequest'
      responses:
        '202':
          description: Batch accepted; individual invalid events may be rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryBatchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
  /v1/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Minimal liveness/readiness status
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is alive but not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
components:
  securitySchemes:
    appToken:
      type: http
      scheme: bearer
      bearerFormat: opaque-app-token
  parameters:
    AppAttestation:
      name: X-App-Attestation
      in: header
      required: false
      description: Optional platform attestation assertion for the prototype
      schema:
        type: string
        maxLength: 8192
    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      schema:
        type: string
    AppVersion:
      name: X-App-Version
      in: header
      required: true
      schema:
        type: string
        maxLength: 32
    AppBuild:
      name: X-App-Build
      in: header
      required: true
      schema:
        type: integer
        minimum: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: UUID generated once per logical create/recreate operation
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/SessionId'
  responses:
    BadRequest:
      description: Request syntax or schema is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: App token is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Installation or operation is forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource was not found for this installation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Concurrent resource or idempotency conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnsupportedConfiguration:
      description: Valid schema but unsupported by active remote config
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Rate or quota limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    PayloadTooLarge:
      description: Telemetry batch exceeds configured size
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UpstreamFailure:
      description: Provider rejected or failed session creation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unavailable:
      description: Kill switch is active or service/upstream is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UpstreamTimeout:
      description: Provider session creation timed out
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    InstallationId:
      type: string
      pattern: '^ins_[A-Za-z0-9]{20,40}$'
    SessionId:
      type: string
      pattern: '^ts_[A-Za-z0-9]{20,40}$'
    LegId:
      type: string
      pattern: '^leg_[A-Za-z0-9]{20,40}$'
    TraceId:
      type: string
      pattern: '^tr_[A-Za-z0-9]{20,40}$'
    EventId:
      type: string
      format: uuid
    TranslationMode:
      type: string
      enum: [one_way_ru_to_en, dialogue]
    TargetLanguage:
      type: string
      enum: [ru, en]
    RegisterInstallationRequest:
      type: object
      additionalProperties: false
      required: [installationPublicId, app, device]
      properties:
        installationPublicId:
          type: string
          format: uuid
          description: Random identifier generated and stored by the app
        app:
          $ref: '#/components/schemas/AppInfo'
        device:
          $ref: '#/components/schemas/DeviceInfo'
    RegisterInstallationResponse:
      type: object
      additionalProperties: false
      required: [installationId, tokenType, appToken]
      properties:
        installationId:
          $ref: '#/components/schemas/InstallationId'
        tokenType:
          type: string
          const: Bearer
        appToken:
          type: string
          minLength: 24
          maxLength: 2048
          description: Sensitive opaque app token; never log
          x-sensitive: true
        expiresAt:
          type: [string, 'null']
          format: date-time
    AppInfo:
      type: object
      additionalProperties: false
      required: [version, build]
      properties:
        version:
          type: string
          maxLength: 32
        build:
          type: integer
          minimum: 1
    DeviceInfo:
      type: object
      additionalProperties: false
      required: [osVersion, modelClass]
      properties:
        osVersion:
          type: string
          maxLength: 32
        modelClass:
          type: string
          enum: [phone]
    AppConfig:
      type: object
      additionalProperties: false
      required:
        - version
        - killSwitch
        - modelAlias
        - allowedModes
        - allowedTargetLanguages
        - maxDurationSeconds
        - reconnectPolicy
        - outputInterruption
        - telemetrySampleRate
      properties:
        version:
          type: string
          maxLength: 64
        killSwitch:
          type: boolean
        killSwitchMessage:
          type: [string, 'null']
          maxLength: 240
        modelAlias:
          type: string
          maxLength: 80
          example: gpt-realtime-translate
        allowedModes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/TranslationMode'
        allowedTargetLanguages:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/TargetLanguage'
        maxDurationSeconds:
          type: integer
          minimum: 60
          maximum: 3600
        reconnectPolicy:
          $ref: '#/components/schemas/ReconnectPolicy'
        outputInterruption:
          $ref: '#/components/schemas/OutputInterruptionPolicy'
        telemetrySampleRate:
          type: number
          minimum: 0
          maximum: 1
        experiments:
          type: object
          additionalProperties:
            type: string
            maxLength: 64
    ReconnectPolicy:
      type: object
      additionalProperties: false
      required: [maxAttempts, backoffMs, disconnectedGraceMs]
      properties:
        maxAttempts:
          type: integer
          minimum: 0
          maximum: 5
        backoffMs:
          type: array
          minItems: 0
          maxItems: 5
          items:
            type: integer
            minimum: 0
            maximum: 30000
        disconnectedGraceMs:
          type: integer
          minimum: 0
          maximum: 30000
    OutputInterruptionPolicy:
      type: object
      additionalProperties: false
      required: [mode, delayMs]
      properties:
        mode:
          type: string
          enum: [finish_current, duck_and_switch, hard_cut]
        delayMs:
          type: integer
          minimum: 0
          maximum: 5000
    CreateTranslationSessionRequest:
      type: object
      additionalProperties: false
      required: [mode, legs, app, device]
      properties:
        mode:
          $ref: '#/components/schemas/TranslationMode'
        sourceLocaleHint:
          type: [string, 'null']
          pattern: '^[a-z]{2}(-[A-Z]{2})?$'
        legs:
          type: array
          minItems: 1
          maxItems: 2
          items:
            $ref: '#/components/schemas/TranslationLegRequest'
        app:
          $ref: '#/components/schemas/AppInfo'
        device:
          $ref: '#/components/schemas/DeviceInfo'
    TranslationLegRequest:
      type: object
      additionalProperties: false
      required: [clientLegId, targetLanguage]
      properties:
        clientLegId:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{1,39}$'
        targetLanguage:
          $ref: '#/components/schemas/TargetLanguage'
    TranslationSession:
      type: object
      additionalProperties: false
      required: [sessionId, traceId, expiresAt, maxDurationSeconds, legs, policy]
      properties:
        sessionId:
          $ref: '#/components/schemas/SessionId'
        traceId:
          $ref: '#/components/schemas/TraceId'
        expiresAt:
          type: string
          format: date-time
          description: App session expiry; each provider credential also has its own expiry
        maxDurationSeconds:
          type: integer
          minimum: 60
          maximum: 3600
        legs:
          type: array
          minItems: 1
          maxItems: 2
          items:
            $ref: '#/components/schemas/TranslationLegCredentials'
        policy:
          $ref: '#/components/schemas/SessionPolicy'
    TranslationLegCredentials:
      type: object
      additionalProperties: false
      required:
        - legId
        - clientLegId
        - targetLanguage
        - provider
        - model
        - clientSecret
        - expiresAt
        - callsUrl
      properties:
        legId:
          $ref: '#/components/schemas/LegId'
        clientLegId:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{1,39}$'
        targetLanguage:
          $ref: '#/components/schemas/TargetLanguage'
        provider:
          type: string
          enum: [openai]
        model:
          type: string
          maxLength: 80
        clientSecret:
          type: string
          minLength: 8
          maxLength: 2048
          description: Sensitive short-lived credential; memory only, never log or persist
          x-sensitive: true
        expiresAt:
          type: string
          format: date-time
          description: Expiry derived from provider response; client must not assume a fixed TTL
        callsUrl:
          type: string
          format: uri
          description: Provider WebRTC SDP endpoint; treat as opaque and allowlist HTTPS hosts
    SessionPolicy:
      type: object
      additionalProperties: false
      required:
        - maxReconnectAttempts
        - reconnectBackoffMs
        - outputInterruption
        - outputInterruptionDelayMs
        - telemetrySampleRate
      properties:
        maxReconnectAttempts:
          type: integer
          minimum: 0
          maximum: 5
        reconnectBackoffMs:
          type: array
          maxItems: 5
          items:
            type: integer
            minimum: 0
            maximum: 30000
        outputInterruption:
          type: string
          enum: [finish_current, duck_and_switch, hard_cut]
        outputInterruptionDelayMs:
          type: integer
          minimum: 0
          maximum: 5000
        telemetrySampleRate:
          type: number
          minimum: 0
          maximum: 1
    RecreateTranslationLegRequest:
      type: object
      additionalProperties: false
      required: [clientLegId, reason]
      properties:
        clientLegId:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{1,39}$'
        reason:
          type: string
          enum: [connection_failed, disconnected_timeout, secret_expired, manual_retry]
    CompleteTranslationSessionRequest:
      type: object
      additionalProperties: false
      required: [result, durationSeconds, activeAudioSeconds, turns, reconnects]
      properties:
        result:
          type: string
          enum: [completed, user_stopped, failed, killed_by_config]
        durationSeconds:
          type: integer
          minimum: 0
          maximum: 7200
        activeAudioSeconds:
          type: integer
          minimum: 0
          maximum: 7200
        turns:
          type: integer
          minimum: 0
        reconnects:
          type: integer
          minimum: 0
        finalRouteType:
          type: [string, 'null']
          enum: [built_in, speaker, bluetooth, wired, usb, unknown, null]
        errorCode:
          type: [string, 'null']
          maxLength: 80
    CompleteTranslationSessionResponse:
      type: object
      additionalProperties: false
      required: [sessionId, status, completedAt]
      properties:
        sessionId:
          $ref: '#/components/schemas/SessionId'
        status:
          type: string
          const: completed
        completedAt:
          type: string
          format: date-time
    FeedbackRequest:
      type: object
      additionalProperties: false
      required: [rating, categories, consentFlags]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        categories:
          type: array
          maxItems: 8
          uniqueItems: true
          items:
            type: string
            enum:
              - wrong_meaning
              - missing_content
              - critical_entity
              - latency
              - audio_quality
              - echo_loop
              - connection
              - ui
              - other
        comment:
          type: [string, 'null']
          maxLength: 500
          description: Optional user text; backend applies redaction and restricted access
        consentFlags:
          $ref: '#/components/schemas/ConsentFlags'
    ConsentFlags:
      type: object
      additionalProperties: false
      required: [storeComment]
      properties:
        storeComment:
          type: boolean
    FeedbackResponse:
      type: object
      additionalProperties: false
      required: [sessionId, updatedAt]
      properties:
        sessionId:
          $ref: '#/components/schemas/SessionId'
        updatedAt:
          type: string
          format: date-time
    TelemetryBatchRequest:
      type: object
      additionalProperties: false
      required: [schemaVersion, sentAt, events]
      properties:
        schemaVersion:
          type: string
          const: '1.0'
        sentAt:
          type: string
          format: date-time
        events:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/TelemetryEventEnvelope'
    TelemetryEventEnvelope:
      type: object
      additionalProperties: false
      required: [eventId, type, monotonicMs, properties]
      properties:
        eventId:
          $ref: '#/components/schemas/EventId'
        sessionId:
          oneOf:
            - $ref: '#/components/schemas/SessionId'
            - type: 'null'
        legId:
          oneOf:
            - $ref: '#/components/schemas/LegId'
            - type: 'null'
        type:
          type: string
          enum:
            - app_opened
            - session_start_tapped
            - session_create_requested
            - session_secret_received
            - webrtc_offer_created
            - webrtc_connected
            - mic_enabled_changed
            - first_input_transcript
            - first_output_transcript
            - first_remote_audio
            - network_degraded
            - reconnect_attempt
            - reconnect_result
            - audio_route_changed
            - session_completed
            - feedback_submitted
        monotonicMs:
          type: integer
          minimum: 0
        properties:
          type: object
          description: Draft until TEL-01; server accepts only per-event allowlisted keys
          maxProperties: 20
          additionalProperties:
            oneOf:
              - type: string
                maxLength: 120
              - type: number
              - type: integer
              - type: boolean
    TelemetryBatchResponse:
      type: object
      additionalProperties: false
      required: [accepted, rejected]
      properties:
        accepted:
          type: integer
          minimum: 0
        rejected:
          type: integer
          minimum: 0
        rejectedEventIds:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/EventId'
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, version, time]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
          maxLength: 64
        time:
          type: string
          format: date-time
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/AppError'
    AppError:
      type: object
      additionalProperties: false
      required: [code, message, retryable, traceId]
      properties:
        code:
          type: string
          enum:
            - INVALID_REQUEST
            - INVALID_APP_TOKEN
            - INSTALLATION_FORBIDDEN
            - RESOURCE_NOT_FOUND
            - IDEMPOTENCY_CONFLICT
            - PARALLEL_SESSION_LIMIT
            - UNSUPPORTED_CONFIGURATION
            - QUOTA_EXCEEDED
            - RATE_LIMITED
            - PAYLOAD_TOO_LARGE
            - UPSTREAM_SESSION_UNAVAILABLE
            - UPSTREAM_TIMEOUT
            - KILL_SWITCH_ACTIVE
            - SERVICE_UNAVAILABLE
            - INTERNAL_ERROR
        message:
          type: string
          maxLength: 240
          description: Safe user-facing message without provider internals
        retryable:
          type: boolean
        retryAfterMs:
          type: [integer, 'null']
          minimum: 0
          maximum: 3600000
        traceId:
          $ref: '#/components/schemas/TraceId'
  examples:
    CreateSessionRequest:
      summary: Two-leg dialogue request
      value:
        mode: dialogue
        sourceLocaleHint: ru-KZ
        legs:
          - clientLegId: ru-to-en
            targetLanguage: en
          - clientLegId: en-to-ru
            targetLanguage: ru
        app:
          version: 0.1.0
          build: 42
        device:
          osVersion: '26.0'
          modelClass: phone
    CreateSessionResponse:
      summary: Two short-lived translation legs
      value:
        sessionId: ts_01JEXAMPLE000000000000000
        traceId: tr_01JEXAMPLE000000000000000
        expiresAt: '2026-07-14T10:05:00Z'
        maxDurationSeconds: 1800
        legs:
          - legId: leg_01JEXAMPLEA0000000000000
            clientLegId: ru-to-en
            targetLanguage: en
            provider: openai
            model: gpt-realtime-translate
            clientSecret: ek_example_redacted
            expiresAt: '2026-07-14T09:36:00Z'
            callsUrl: https://api.openai.com/v1/realtime/translations/calls
          - legId: leg_01JEXAMPLEB0000000000000
            clientLegId: en-to-ru
            targetLanguage: ru
            provider: openai
            model: gpt-realtime-translate
            clientSecret: ek_example_redacted
